<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    :root {
      --app-height: 100dvh;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: var(--app-height);
      overflow: hidden;
      background: #000;
    }

    #unity-canvas {
      display: block;
      width: 100vw;
      height: var(--app-height);
      max-width: 100vw;
      max-height: var(--app-height);
      background: #000;
    }

    #loader {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}}></canvas>
    <div id="loader">Loading...</div>
  </div>
  <script src="Build/{{{ LOADER_FILENAME }}}"></script>
  <script>
    var unityContainer = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loader = document.querySelector("#loader");
    var buildWidth = {{{ WIDTH }}};
    var buildHeight = {{{ HEIGHT }}};
    var portraitWidth = Math.min(buildWidth, buildHeight);
    var portraitHeight = Math.max(buildWidth, buildHeight);
    var targetAspect = portraitWidth / portraitHeight;

    // Prevent mobile scrolling and zooming
    document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

    var config = {
      dataUrl: "Build/{{{ DATA_FILENAME }}}",
      frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: "Build/{{{ CODE_FILENAME }}}",
      #if MEMORY_FILENAME
        memoryUrl: "Build/{{{ MEMORY_FILENAME }}}",
      #endif
#if SYMBOLS_FILENAME
        symbolsUrl: "Build/{{{ SYMBOLS_FILENAME }}}",
      #endif
        streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
      devicePixelRatio: window.devicePixelRatio, // Keeping high DPI as previously requested
      matchWebGLToCanvasSize: true,
    };

    createUnityInstance(canvas, config, (progress) => {
      loader.innerText = Math.round(progress * 100) + "%";
    }).then((unityInstance) => {
      loader.style.display = "none";
      // Force resizing after load to ensure no scrollbars
      window.dispatchEvent(new Event('resize'));
    }).catch((message) => {
      alert(message);
    });

    function getViewportSize() {
      var viewport = window.visualViewport;
      var width = viewport ? viewport.width : window.innerWidth;
      var height = viewport ? viewport.height : window.innerHeight;

      return {
        width: Math.max(1, Math.round(width)),
        height: Math.max(1, Math.round(height))
      };
    }

    function getFullscreenElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
    }

    function requestFullscreen(element) {
      if (element.requestFullscreen) {
        return element.requestFullscreen({ navigationUI: "hide" });
      }

      if (element.webkitRequestFullscreen) {
        return element.webkitRequestFullscreen();
      }

      if (element.msRequestFullscreen) {
        return element.msRequestFullscreen();
      }

      return Promise.reject();
    }

    function isMobileDevice() {
      return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    }

    async function ensurePortraitExperience() {
      if (!isMobileDevice()) {
        return;
      }

      if (!getFullscreenElement()) {
        try {
          await requestFullscreen(document.documentElement);
        } catch (e) {
        }
      }

      if (screen.orientation && screen.orientation.lock) {
        try {
          await screen.orientation.lock("portrait");
        } catch (e) {
        }
      }
    }

    function resizeCanvas() {
      var viewport = getViewportSize();
      var w = viewport.width;
      var h = viewport.height;
      var targetWidth = w;
      var targetHeight = Math.round(targetWidth / targetAspect);

      if (targetHeight > h) {
        targetHeight = h;
        targetWidth = Math.round(targetHeight * targetAspect);
      }

      document.documentElement.style.setProperty('--app-height', h + "px");
      unityContainer.style.width = w + "px";
      unityContainer.style.height = h + "px";

      canvas.style.width = targetWidth + "px";
      canvas.style.height = targetHeight + "px";
    }

    window.addEventListener('orientationchange', resizeCanvas);
    window.addEventListener('resize', resizeCanvas);
    document.addEventListener('fullscreenchange', resizeCanvas);
    document.addEventListener('webkitfullscreenchange', resizeCanvas);
    document.addEventListener('pointerdown', ensurePortraitExperience, { once: true });
    document.addEventListener('touchstart', ensurePortraitExperience, { once: true, passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', resizeCanvas);
    }

    resizeCanvas();
  </script>
</body>

</html>
