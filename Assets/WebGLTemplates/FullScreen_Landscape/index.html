<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #gameContainer {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #unity-canvas {
      height: 100vh;
      width: 100%;
      background: #000;
    }

    #loader {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}}></canvas>
    <div id="loader">Loading...</div>
  </div>
  <script src="Build/{{{ LOADER_FILENAME }}}"></script>
  <script>
    var canvas = document.querySelector("#unity-canvas");
    var loader = document.querySelector("#loader");

    // Prevent mobile scrolling and zooming
    document.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });

    var config = {
      dataUrl: "Build/{{{ DATA_FILENAME }}}",
      frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: "Build/{{{ CODE_FILENAME }}}",
      #if MEMORY_FILENAME
        memoryUrl: "Build/{{{ MEMORY_FILENAME }}}",
      #endif
#if SYMBOLS_FILENAME
        symbolsUrl: "Build/{{{ SYMBOLS_FILENAME }}}",
      #endif
        streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
      devicePixelRatio: window.devicePixelRatio, // Keeping high DPI as previously requested
    };

    createUnityInstance(canvas, config, (progress) => {
      loader.innerText = Math.round(progress * 100) + "%";
    }).then((unityInstance) => {
      loader.style.display = "none";
      // Force resizing after load to ensure no scrollbars
      window.dispatchEvent(new Event('resize'));
    }).catch((message) => {
      alert(message);
    });

    // Robust resizing to prevent scrolling
    function resizeCanvas() {
      var w = window.innerWidth;
      var h = window.innerHeight;
      var dpr = window.devicePixelRatio || 1;

      canvas.style.width = w + "px";
      canvas.style.height = h + "px";

      canvas.width = w * dpr;
      canvas.height = h * dpr;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); // Initial call
  </script>
</body>

</html>
